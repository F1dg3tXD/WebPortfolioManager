name: Build WebPortfolioManager

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows

          - os: ubuntu-latest
            artifact_name: linux

          - os: macos-latest
            artifact_name: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Clone WebPortfolioManager
        run: git clone https://github.com/F1dg3tXD/WebPortfolioManager.git

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: WebPortfolioManager/manage/package-lock.json

      - name: Install dependencies
        working-directory: WebPortfolioManager/manage
        run: npm install

      - name: Build application
        working-directory: WebPortfolioManager/manage
        run: npm run build

      - name: Show build output
        working-directory: WebPortfolioManager/manage
        run: |
          echo "=== DIST ==="
          ls -R dist || true
          echo "=== BUILD ==="
          ls -R build || true
          echo "=== OUT ==="
          ls -R out || true

      # Zip macOS .app bundle
      - name: Package macOS app
        if: runner.os == 'macOS'
        working-directory: WebPortfolioManager/manage
        run: |
          APP=$(find dist out build -name "*.app" -type d 2>/dev/null | head -n 1)

          if [ -z "$APP" ]; then
            echo "No .app bundle found!"
            exit 1
          fi

          echo "Found app bundle: $APP"

          ditto -c -k --sequesterRsrc --keepParent "$APP" app-macos.zip

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: WebPortfolioManager-macos
          path: WebPortfolioManager/manage/app-macos.zip

      - name: Upload Windows/Linux artifacts
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: WebPortfolioManager-${{ matrix.artifact_name }}
          path: |
            WebPortfolioManager/manage/dist/**
            WebPortfolioManager/manage/build/**
            WebPortfolioManager/manage/out/**
          if-no-files-found: warn
